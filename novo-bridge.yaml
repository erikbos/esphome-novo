esphome:
  name: novo-bridge
  friendly_name: "Bridge"
  includes:
    - cc1101_radio.h

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

# SPI bus for the CC1101 radio
spi:
  clk_pin: GPIO6
  mosi_pin: GPIO7
  miso_pin: GPIO2

# Native CC1101 radio bring-up: RF/modem parameters only.
# The Novo packet framing (sync word, preamble, packet length, CRC, whitening, packet mode)
# is configured from C++ in cc1101_radio.h, not here.
cc1101:
  id: radio
  cs_pin: GPIO18
  gdo0_pin: GPIO15
  frequency: 868.0MHz
  modulation_type: 2-FSK
  symbol_rate: 9600
  fsk_deviation: 50kHz
  filter_bandwidth: 101kHz
  output_power: 11

logger:
  level: INFO

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 15min

web_server:
  port: 80

switch:
  - platform: gpio
    id: status_led
    name: "Status LED"
    pin: GPIO19
    restore_mode: ALWAYS_OFF

binary_sensor:
  - platform: gpio
    id: boot_button
    name: "Boot Button"
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true

select:
  - platform: template
    name: "Remote"
    id: novo_remote_select
    optimistic: true
    initial_option: "Remote 1"
    options:
      - "Remote 1"
      - "Remote 2"
      - "Remote 3"
    set_action:
      - lambda: |-
          if (x == "Remote 1") {
            novo_set_remote(0);
          } else if (x == "Remote 2") {
            novo_set_remote(1);
          } else if (x == "Remote 3") {
            novo_set_remote(2);
          }

  - platform: template
    name: "Channel"
    id: novo_channel_select
    optimistic: true
    initial_option: "1"
    options:
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "6"
    set_action:
      - lambda: |-
          if (x == "1") novo_set_channel_number(1);
          else if (x == "2") novo_set_channel_number(2);
          else if (x == "3") novo_set_channel_number(3);
          else if (x == "4") novo_set_channel_number(4);
          else if (x == "5") novo_set_channel_number(5);
          else if (x == "6") novo_set_channel_number(6);

cover:
  - platform: template
    name: "Blind Channel 1"
    id: novo_blind_channel_1
    optimistic: true
    assumed_state: true

    open_action:
      - lambda: |-
          novo_set_remote(2);          // Remote 3
          novo_set_channel_number(1);  // Channel 1
          novo_open(id(radio));

    close_action:
      - lambda: |-
          novo_set_remote(2);          // Remote 3
          novo_set_channel_number(1);  // Channel 1
          novo_close(id(radio));

    stop_action:
      - lambda: |-
          novo_set_remote(2);          // Remote 3
          novo_set_channel_number(1);  // Channel 1
          novo_stop(id(radio));

  - platform: template
    name: "Blind Channel 2"
    id: novo_blind_channel_2
    optimistic: true
    assumed_state: true

    open_action:
      - lambda: |-
          novo_set_remote(2);          // Remote 3
          novo_set_channel_number(2);  // Channel 2
          novo_open(id(radio));

    close_action:
      - lambda: |-
          novo_set_remote(2);          // Remote 3
          novo_set_channel_number(2);  // Channel 2
          novo_close(id(radio));

    stop_action:
      - lambda: |-
          novo_set_remote(2);          // Remote 3
          novo_set_channel_number(2);  // Channel 2
          novo_stop(id(radio));

button:
  - platform: restart
    name: "Restart"

  - platform: template
    name: "Open"
    on_press:
      - lambda: |-
          novo_open(id(radio));

  - platform: template
    name: "Stop"
    on_press:
      - lambda: |-
          novo_stop(id(radio));

  - platform: template
    name: "Close"
    on_press:
      - lambda: |-
          novo_close(id(radio));

  - platform: template
    name: "Pair"
    on_press:
      - lambda: |-
          novo_pair(id(radio));

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  - platform: internal_temperature
    name: "ESP32 Internal Temperature"
    update_interval: 60s

text_sensor:
  - platform: version
    name: "ESPHome Version"

  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"
